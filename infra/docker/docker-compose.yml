services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file: ../../.env
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A app.celery worker --loglevel=info -Q default,topics

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file: ../../.env
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: lingua_companion
      POSTGRES_USER: lingua
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - lingua_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingua -d lingua_companion"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - lingua_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  lingua_pgdata:
  lingua_redisdata:
