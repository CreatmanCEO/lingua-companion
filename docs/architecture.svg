<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" width="980" height="540" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Helvetica, Arial">
  <title>LinguaCompanion — system architecture</title>
  <desc>Architecture: Next.js 16 web client connects via WebSocket to a FastAPI backend. Backend orchestrates 12 AI agents (STT, companion, memory, reconstruction, phrase variants, TTS, etc.). STT uses Deepgram Nova-3 as primary with Groq Whisper as fallback. LLM is Groq Llama 3.3 70B with DeepSeek for onboarding. TTS is multi-provider — ElevenLabs in production with AWS Polly / Edge-TTS / Google as fallbacks. Storage is Supabase Postgres with pgvector for memory and Upstash Redis for cache and Celery queues.</desc>

  <rect x="0" y="0" width="980" height="540" fill="#0d1117"/>

  <text x="490" y="32" text-anchor="middle" font-size="18" fill="#e6edf3" font-weight="600">LinguaCompanion — system architecture</text>
  <text x="490" y="52" text-anchor="middle" font-size="12" fill="#7d8590">Next.js 16 client · FastAPI backend · 12 AI agents · multi-provider STT &amp; TTS</text>

  <!-- Client layer -->
  <rect x="40" y="80" width="900" height="60" rx="10" fill="#1f2937" stroke="#cc785c"/>
  <text x="490" y="104" text-anchor="middle" font-size="13" fill="#cc785c" font-weight="700">Browser · Next.js 16 (React 19, Zustand, Tailwind, shadcn/ui)</text>
  <text x="490" y="124" text-anchor="middle" font-size="11" fill="#9ca3af">Free Chat · Scenarios · Phrase Library · Stats · Settings · Voice + Text input · Grammar / Variants toggles · Theme · 3 companions × 4 voices</text>

  <!-- Connection -->
  <line x1="490" y1="140" x2="490" y2="172" stroke="#4b5563" stroke-width="2"/>
  <polygon points="490,180 484,168 496,168" fill="#4b5563"/>
  <text x="500" y="160" font-size="10" fill="#7d8590">WebSocket · REST</text>

  <!-- API gateway -->
  <rect x="40" y="186" width="900" height="60" rx="10" fill="#1f2937" stroke="#3b9eff"/>
  <text x="490" y="208" text-anchor="middle" font-size="13" fill="#3b9eff" font-weight="700">FastAPI backend (Python 3.12) · port 8001</text>
  <text x="490" y="228" text-anchor="middle" font-size="11" fill="#9ca3af">/ws/session · /api/v1/{auth, session, phrases, stats, push, translate, tts, opengraph} · Celery queue handler</text>

  <!-- Agent layer -->
  <rect x="40" y="266" width="900" height="120" rx="10" fill="#161b22" stroke="#9d6cff"/>
  <text x="490" y="288" text-anchor="middle" font-size="13" fill="#9d6cff" font-weight="700">12 AI agents (orchestrated)</text>
  <g font-size="11" fill="#d1d5db">
    <text x="64" y="312">• <tspan fill="#dcdcaa">stt.py</tspan> — Deepgram Nova-3 → Groq Whisper</text>
    <text x="64" y="330">• <tspan fill="#dcdcaa">companion.py</tspan> — Groq Llama / DeepSeek</text>
    <text x="64" y="348">• <tspan fill="#dcdcaa">reconstruction.py</tspan> — grammar + intent</text>
    <text x="64" y="366">• <tspan fill="#dcdcaa">phrase_variants.py</tspan> — 5 phrasings</text>

    <text x="356" y="312">• <tspan fill="#dcdcaa">memory.py</tspan> — pgvector embeddings</text>
    <text x="356" y="330">• <tspan fill="#dcdcaa">onboarding.py</tspan> — first-session facts</text>
    <text x="356" y="348">• <tspan fill="#dcdcaa">orchestrator.py</tspan> — agent routing</text>
    <text x="356" y="366">• <tspan fill="#dcdcaa">tts.py</tspan> — ElevenLabs / Polly / Edge / Google</text>

    <text x="660" y="312">• <tspan fill="#dcdcaa">analytics.py</tspan> — fluency metrics</text>
    <text x="660" y="330">• <tspan fill="#dcdcaa">pronunciation.py</tspan> — Azure Speech</text>
    <text x="660" y="348">• <tspan fill="#dcdcaa">topic_discovery.py</tspan> — proactive (off)</text>
    <text x="660" y="366">• Celery workers · background tasks</text>
  </g>

  <!-- External providers row -->
  <line x1="490" y1="386" x2="490" y2="410" stroke="#4b5563" stroke-width="2" stroke-dasharray="3 3"/>

  <g>
    <rect x="40" y="416" width="200" height="56" rx="8" fill="#1f2937" stroke="#27c93f"/>
    <text x="140" y="438" text-anchor="middle" font-size="12" fill="#27c93f" font-weight="700">STT</text>
    <text x="140" y="456" text-anchor="middle" font-size="10" fill="#9ca3af">Deepgram Nova-3 + Groq Whisper</text>

    <rect x="252" y="416" width="200" height="56" rx="8" fill="#1f2937" stroke="#dcdcaa"/>
    <text x="352" y="438" text-anchor="middle" font-size="12" fill="#dcdcaa" font-weight="700">LLM</text>
    <text x="352" y="456" text-anchor="middle" font-size="10" fill="#9ca3af">Groq Llama 3.3 70B + DeepSeek</text>

    <rect x="464" y="416" width="200" height="56" rx="8" fill="#1f2937" stroke="#cc785c"/>
    <text x="564" y="438" text-anchor="middle" font-size="12" fill="#cc785c" font-weight="700">TTS multi-provider</text>
    <text x="564" y="456" text-anchor="middle" font-size="10" fill="#9ca3af">ElevenLabs · Polly · Edge · Google</text>

    <rect x="676" y="416" width="200" height="56" rx="8" fill="#1f2937" stroke="#3b9eff"/>
    <text x="776" y="438" text-anchor="middle" font-size="12" fill="#3b9eff" font-weight="700">Storage</text>
    <text x="776" y="456" text-anchor="middle" font-size="10" fill="#9ca3af">Supabase pgvector + Upstash Redis</text>
  </g>

  <!-- Deployment footer -->
  <text x="490" y="500" text-anchor="middle" font-size="11" fill="#7d8590">Deployment · Docker Compose · Coolify · sec VPS · nginx reverse proxy + TLS</text>
  <text x="490" y="520" text-anchor="middle" font-size="11" fill="#7d8590">Monorepo · Turborepo + pnpm workspaces · backend (FastAPI) · apps/web (Next.js) · packages/types</text>
</svg>
